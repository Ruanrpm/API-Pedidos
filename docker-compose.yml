version: "3.8"

services:
  db:
    image: postgres:16
    container_name: postgres_pedidos
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pedidos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: api_pedidos
    restart: always
    depends_on:
      - db
    ports:
      - "3333:3333"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: pedidos

volumes:
  pgdata: